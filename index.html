<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPulse // Direct Carbon Analytics</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b130e;
            color: #e3ede6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-window {
            background: #14221a;
            border: 1px solid #233b2e;
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #8ba394;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .field-box {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8ba394;
            margin-bottom: 8px;
        }

        select,
        input {
            width: 100%;
            background: #1c2f24;
            border: 1px solid #2a4737;
            border-radius: 10px;
            padding: 14px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        select:focus,
        input:focus {
            border-color: #4ade80;
        }

        .action-btn {
            background: #22c55e;
            color: #052e16;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            padding: 16px;
            width: 100%;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        .action-btn:hover {
            background: #4ade80;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .output-panel {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px dashed #2a4737;
            display: none;
        }

        .total-display {
            font-size: 48px;
            font-weight: 800;
            color: #4ade80;
            line-height: 1;
            margin-bottom: 4px;
        }

        .total-unit {
            font-size: 13px;
            color: #8ba394;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        .strategy-list {
            list-style: none;
        }

        .strategy-item {
            background: #1c2f24;
            border-left: 3px solid #22c55e;
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            line-height: 1.5;
            color: #cbd5e1;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="app-window">
        <h1>EcoPulse</h1>
        <p class="subtitle">Personal carbon footprint estimation engine</p>

        <div class="field-box">
            <label for="userDiet">Diet Framework</label>
            <select id="userDiet">
                <option value="high-protein">Omnivore (Heavy Meat)</option>
                <option value="balanced">Balanced (Low Meat)</option>
                <option value="plant-based">Plant-Based / Vegan</option>
            </select>
        </div>

        <div class="field-box">
            <label for="userTransit">Weekly Drive Distance (Miles)</label>
            <input type="number" id="userTransit" min="0" value="0">
        </div>

        <button class="action-btn" onclick="runCarbonEngine()">Process Analytics</button>

        <div class="output-panel" id="outputModule">
            <div class="total-display" id="finalMetric">0.00</div>
            <div class="total-unit">Metric Tons CO2e / Year</div>
            <ul class="strategy-list" id="strategyTarget"></ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
